name: Auto-close pull requests

# This is a public STARTER repo — it's meant to be copied, not contributed to.
# Pull requests can expose a contributor's private deck content (slide text,
# client names, the saved brief in notes.md) publicly in the diff. So every PR
# is greeted with a friendly note and closed automatically.
#
# Uses pull_request_target so the job runs with this repo's token (PRs from
# forks otherwise get a read-only token and couldn't comment or close).

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "Thanks for the interest! 🙇",
              "",
              "This is a **public starter kit, not a shared content repo**, so it",
              "doesn't accept pull requests — this PR is being closed automatically.",
              "",
              "- **Building decks?** Clone or *Use this template*, then keep your",
              "  work in your own (ideally private) repo. Your slide content should",
              "  never live in a public PR here.",
              "- **Improving the tooling** (`theme.css`, `deck.js`, `review.py`, docs)?",
              "  Please open an **issue** describing the change instead.",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed",
            });
